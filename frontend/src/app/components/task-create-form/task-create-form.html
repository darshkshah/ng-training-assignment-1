<section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
    class="slds-modal slds-fade-in-open slds-modal_medium" [class]="{'display-none': !modalVisibility()}">
    <div class="slds-modal__container">
        <button class="slds-button slds-button_icon slds-modal__close" (click)="close()">
            <svg class="slds-button__icon slds-button__icon_large" aria-hidden="true">
                <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
            </svg>
            <span class="slds-assistive-text">Cancel and close</span>
        </button>
        <div class="slds-modal__header">
            <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">New Task</h1>
        </div>
        <!-- FORM CONTENT START -->
        <form [formGroup]="todoFormGroup">
            <div class="slds-modal__content slds-p-around_medium form-content" id="modal-content-id-1">
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-2">
                        <!-- USER LIST DROPDOWN -->
                        <app-picklist
                            [picklistOptions]="usersPickList()"
                            [inputData]="assignedToPicklistData"
                            [control]="todoFormGroup.controls.todoAssignedTo">
                        </app-picklist>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <app-picklist
                            [picklistOptions]="statusPickListInputs.content"
                            [control]="todoFormGroup.controls.todoStatus"
                            [inputData]="statusPickListInputs">
                        </app-picklist>
                    </div>
                </div>
                <!-- FIRST ROW DROPDOWN END -->
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-2">
                        <app-datepicker
                            [control]="todoFormGroup.controls.todoDueDate">
                        </app-datepicker>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <app-picklist 
                            [picklistOptions]="priorityPickListInputs.content"
                            [control]="todoFormGroup.controls.todoPriority"
                            [inputData]="priorityPickListInputs">
                        </app-picklist>
                    </div>
                </div>

                <div class="slds-form-element" [class]="{'slds-has-error': isDescriptionMarkedError}">
                    <label class="slds-form-element__label" for="textarea-id-01"
                    [class]="{'error': isDescriptionMarkedError}">
                        <abbr class="slds-required" title="required" aria-hidden="true">* </abbr>Textarea Label</label>
                    <div class="slds-form-element__control">
                        <textarea id="textarea-id-01" required="" placeholder="Placeholder text…" class="slds-textarea"
                            formControlName="todoDescription">
                        </textarea>
                    </div>
                    @if (isDescriptionMarkedError) {
                        <div class="slds-form-element__help" id="error-01">This field is required.</div>
                    }
                </div>
                <!-- FIRST ROW DROPDOWN START -->
            </div>
            <div class="slds-modal__footer">
                <button class="slds-button slds-button_neutral" aria-label="Cancel and close" (click)="close()">Cancel</button>
                <button class="slds-button slds-button_brand" (click)="handleSubmit()">Save</button>
            </div>
        </form>
    </div>
</section>
<div class="slds-backdrop" role="presentation" [class]="{'slds-backdrop_open': modalVisibility()}"></div>
